name: Update GitHub Stats

on:
  # 1. 推送到 main 分支时触发
  push:
    branches: [ main ]

  # 2. 定时触发（每天 UTC 02:00，对应北京时间 10:00）
  schedule:
    - cron: "0 2 * * *"

  # 3. 允许手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Create profile directory
        run: mkdir -p profile

      - name: Generate Stats Card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: stats
          options: username=cuteLittleDevil&show_icons=true&theme=radical
          path: profile/github-stats.svg

      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448 # v2.0.1
        with:
          card: top-langs
          options: username=cuteLittleDevil&layout=compact&theme=radical
          path: profile/top-langs.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/
          git commit -m "Update GitHub stats cards" || exit 0
          git push
